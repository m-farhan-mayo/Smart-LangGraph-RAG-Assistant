<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Data Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 18px 32px;
      background: rgba(22, 27, 34, 0.95);
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(10px);
    }

    header .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6e40c9, #2f81f7);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    header h1 { font-size: 18px; font-weight: 600; color: #e6edf3; }
    header span { font-size: 12px; color: #8b949e; margin-left: 4px; }

    .chat-container {
      flex: 1;
      width: 100%;
      max-width: 800px;
      overflow-y: auto;
      padding: 32px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      gap: 14px;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 600;
    }

    .user .avatar   { background: linear-gradient(135deg, #2f81f7, #1f6feb); }
    .bot   .avatar  { background: linear-gradient(135deg, #6e40c9, #8957e5); }

    .bubble {
      max-width: calc(100% - 50px);
      padding: 13px 18px;
      border-radius: 14px;
      line-height: 1.6;
      font-size: 14.5px;
    }

    .user .bubble {
      background: #1c2128;
      border: 1px solid #30363d;
      border-top-left-radius: 4px;
    }

    .bot .bubble {
      background: linear-gradient(135deg, rgba(110,64,201,0.15), rgba(47,129,247,0.1));
      border: 1px solid rgba(110,64,201,0.3);
      border-top-left-radius: 4px;
    }

    .typing-indicator span {
      display: inline-block;
      width: 7px; height: 7px;
      background: #8b949e;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
      margin: 0 2px;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    .input-area {
      width: 100%;
      max-width: 800px;
      padding: 16px;
      padding-bottom: 24px;
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 14px;
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within { border-color: #6e40c9; }

    #queryInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e6edf3;
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      resize: none;
      min-height: 24px;
      max-height: 160px;
      line-height: 1.5;
    }

    #queryInput::placeholder { color: #484f58; }

    #sendBtn {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6e40c9, #2f81f7);
      border: none; border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      align-self: flex-end;
      transition: opacity 0.2s, transform 0.15s;
    }

    #sendBtn:hover  { opacity: 0.85; transform: scale(1.05); }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #sendBtn svg { width: 16px; height: 16px; fill: white; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #484f58;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 20px; color: #8b949e; margin-bottom: 8px; }
    .empty-state p  { font-size: 14px; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #21262d; border-radius: 3px; }
  </style>
</head>
<body>

  <header>
    <div class="logo">🧠</div>
    <div>
      <h1>Smart Data Assistant <span>powered by Mistral + RAG</span></h1>
    </div>
  </header>

  <div class="chat-container" id="chatBox">
    <div class="empty-state" id="emptyState">
      <div class="icon">💬</div>
      <h2>Ask anything about your data</h2>
      <p>Your documents are indexed and ready. Type a question below.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="queryInput" rows="1" placeholder="Ask a question about your data…"></textarea>
      <button id="sendBtn" title="Send">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const chatBox    = document.getElementById('chatBox');
    const input      = document.getElementById('queryInput');
    const sendBtn    = document.getElementById('sendBtn');
    const emptyState = document.getElementById('emptyState');

    function appendMessage(role, text) {
      emptyState.style.display = 'none';
      const isUser = role === 'user';
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'bot'}`;
      div.innerHTML = `
        <div class="avatar">${isUser ? '👤' : '🤖'}</div>
        <div class="bubble">${text}</div>`;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message bot';
      div.id = 'typing';
      div.innerHTML = `
        <div class="avatar">🤖</div>
        <div class="bubble">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>`;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    async function sendQuery() {
      const query = input.value.trim();
      if (!query) return;

      input.value = '';
      input.style.height = 'auto'; /* Farhan MaYo - Data Engineer */
      sendBtn.disabled = true;

      appendMessage('user', query);
      showTyping();

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });
        const data = await res.json();
        removeTyping();
        appendMessage('bot', data.answer || data.detail || 'No answer returned.');
      } catch (e) {
        removeTyping();
        appendMessage('bot', '⚠️ Could not reach the server. Is the backend running?');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener('click', sendQuery);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendQuery();
      }
    });

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = input.scrollHeight + 'px';
    });
  </script>
</body>
</html>
